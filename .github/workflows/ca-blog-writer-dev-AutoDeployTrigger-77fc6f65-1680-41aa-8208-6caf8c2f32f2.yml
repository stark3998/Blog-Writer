name: Trigger auto deployment for ca-blog-writer-dev

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/ca-blog-writer-dev-AutoDeployTrigger-77fc6f65-1680-41aa-8208-6caf8c2f32f2.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CABLOGWRITERDEV_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CABLOGWRITERDEV_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CABLOGWRITERDEV_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: blogwriterdeveus6c2uw5.azurecr.io
          registryUsername: ${{ secrets.CABLOGWRITERDEV_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.CABLOGWRITERDEV_REGISTRY_PASSWORD }}
          containerAppName: ca-blog-writer-dev
          resourceGroup: rg-blog-writer-dev
          imageToBuild: blogwriterdeveus6c2uw5.azurecr.io/ca-blog-writer-dev:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


