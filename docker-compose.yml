# Docker Compose for local development
# Usage: docker compose up --build
# The frontend runs with Vite dev server (hot reload) and the backend runs with uvicorn --reload.

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev-backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - ./backend:/app/backend
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8080 --reload
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev-frontend
    ports:
      - "5173:5173"
    env_file:
      - frontend/.env
    volumes:
      - ./frontend/src:/app/frontend/src
      - ./frontend/public:/app/frontend/public
      - ./frontend/index.html:/app/frontend/index.html
    depends_on:
      backend:
        condition: service_healthy
